<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">

  <title>Cocos Creator | GameLobby</title>

  <!--http://www.html5rocks.com/en/mobile/mobifying/-->
  <meta name="viewport"
        content="width=device-width,user-scalable=no,initial-scale=1, minimum-scale=1,maximum-scale=1"/>

  <!--https://developer.apple.com/library/safari/documentation/AppleApplications/Reference/SafariHTMLRef/Articles/MetaTags.html-->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="format-detection" content="telephone=no">

  <!-- force webkit on 360 -->
  <meta name="renderer" content="webkit"/>
  <meta name="force-rendering" content="webkit"/>
  <!-- force edge on IE -->
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="msapplication-tap-highlight" content="no">

  <!-- force full screen on some browser -->
  <meta name="full-screen" content="yes"/>
  <meta name="x5-fullscreen" content="true"/>
  <meta name="360-fullscreen" content="true"/>
  
  <!-- force screen orientation on some browser -->
  <meta name="screen-orientation" content=""/>
  <meta name="x5-orientation" content="">

  <!--<link rel="apple-touch-icon" href=".png" />-->
  <!--<link rel="apple-touch-icon-precomposed" href=".png" />-->

  <link rel="stylesheet" type="text/css" href="https://cdn.jsdmirror.com/gh/qq293814/buyu-cdn-2026@main/h5_game/style-mobile.css"/>

</head>
<body>
  <canvas id="GameCanvas" oncontextmenu="event.preventDefault()" tabindex="0"></canvas>
  
  <div id="game-controls" style="position: fixed; right: 0px; bottom: 0px; z-index: 10000; display: none;">
    <button id="autoShootBtn" style="display: block; width: 70px; height: 70px; margin: 0 10px 10px 0; background: url('https://www.pay66.cn/自动发射.jpeg?ver=2026041201') no-repeat center; background-size: 100% 100%; border: 2px solid #FFD700; border-radius: 6px; cursor: pointer; color: transparent; font-size: 0; box-shadow: 2px 2px 4px rgba(0,0,0,0.3); outline: none; -webkit-tap-highlight-color: transparent; user-select: none;"></button>
    <button id="lockFishBtn" style="display: block; width: 70px; height: 70px; margin: 0 10px 10px 0; background: url('https://www.pay66.cn/锁定.jpeg?ver=2026041201') no-repeat center; background-size: 100% 100%; border: 2px solid #FFD700; border-radius: 6px; cursor: pointer; color: transparent; font-size: 0; box-shadow: 2px 2px 4px rgba(0,0,0,0.3); outline: none; -webkit-tap-highlight-color: transparent; user-select: none;"></button>
  </div>
  <style>
    #lockFishBtn:active, #autoShootBtn:active {
      transform: none !important;
      box-shadow: 2px 2px 4px rgba(0,0,0,0.3) !important;
    }
    #lockFishBtn, #autoShootBtn {
      transition: none !important;
      -webkit-transition: none !important;
      -moz-transition: none !important;
    }
    #lockFishBtn.active, #autoShootBtn.active {
      opacity: 0.8;
    }
  </style>
  
  <div id="splash">
    <div class="progress-bar stripes">
      <span style="width: 0%"></span>
    </div>
  </div>
<script src="https://cdn.jsdmirror.com/gh/qq293814/buyu-cdn-2026@main/h5_game/src/settings.js" charset="utf-8"></script>
<script src="https://cdn.jsdmirror.com/gh/qq293814/buyu-cdn-2026@main/h5_game/main.js" charset="utf-8"></script>

</body>
</html>
